name: flutter_pagination_pro
description: "Flutter pagination: generic page keys (int, cursor, offset), infinite scroll, load more button, grid view, slivers, numbered pagination, bidirectional scroll, animated lists, keyboard navigation, auto-retry with backoff, controlled mode, updateFetchPage for search/filter, built-in loading/error/empty states, pull-to-refresh, initialItems, skeleton loading, and testing utilities."
version: 1.0.0
homepage: https://github.com/Masum-MSNR/flutter_pagination_pro
repository: https://github.com/Masum-MSNR/flutter_pagination_pro
issue_tracker: https://github.com/Masum-MSNR/flutter_pagination_pro/issues

topics:
  - pagination
  - infinite-scroll
  - lazy-loading
  - listview
  - gridview

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  matcher: ">=0.12.0 <1.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

