name: flutter_pagination_pro
description: "Zero-dependency Flutter pagination: infinite scroll, load more button, grid view, slivers, and numbered pagination. Built-in loading/error/empty states, pull-to-refresh, cache-first initialItems, pageSize auto-detection, and totalItems tracking."
version: 0.2.0
homepage: https://github.com/Masum-MSNR/flutter_pagination_pro
repository: https://github.com/Masum-MSNR/flutter_pagination_pro
issue_tracker: https://github.com/Masum-MSNR/flutter_pagination_pro/issues

topics:
  - pagination
  - infinite-scroll
  - lazy-loading
  - listview
  - gridview

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
